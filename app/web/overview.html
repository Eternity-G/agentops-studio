<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>仓库概览 - 代码仓库理解 Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="overview">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span>Codebase AgentOps Studio</span>
          <strong>代码仓库理解 Agent</strong>
        </a>
        <nav class="nav-list" aria-label="页面导航">
          <a href="/">功能首页</a>
          <a class="active" href="/overview">仓库概览</a>
          <a href="/ask">代码问答</a>
          <a href="/impact">影响分析</a>
          <a href="/review">Diff Review</a>
          <a href="/eval">评测报告</a>
        </nav>
      </aside>
      <main class="workspace">
        <section class="toolbar">
          <div><span class="status-dot"></span><span id="healthStatus">检查中</span></div>
          <a class="docs-link" href="/docs" target="_blank" rel="noreferrer">OpenAPI</a>
        </section>
        <section class="tool-layout">
          <form class="tool-form" id="overviewForm">
            <p class="eyebrow">Repository Overview</p>
            <h1>仓库概览</h1>
            <p class="form-copy">输入本地仓库路径，系统会扫描结构、读取关键证据，并在配置 DeepSeek 时生成深度 Markdown 报告。</p>
            <label>
              <span>仓库路径</span>
              <input id="overviewRepo" value="external-repos/novu" autocomplete="off" />
            </label>
            <button type="submit">生成仓库理解报告</button>
          </form>
          <article class="result-pane">
            <header>
              <h2>分析报告</h2>
              <span id="overviewSource" class="tag">等待运行</span>
            </header>
            <div id="overviewOutput" class="markdown-output empty">报告会显示在这里。</div>
          </article>
        </section>
      </main>
    </div>
    <script src="/static/app.js?v=markdown-table-20260720"></script>
  </body>
</html>
